name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build and publish release
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build package
        run: ./scripts/package_release.sh

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/DockPin.zip
          generate_release_notes: true
